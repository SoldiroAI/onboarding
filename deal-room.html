<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soldiro AI — Deal Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07070a;
      --surface:   #0d0d16;
      --surface2:  #111119;
      --surface3:  #181825;
      --surface4:  #1e1e2e;
      --border:    #1e1e2e;
      --border2:   #2a2a3a;
      --border3:   #38384e;
      --gold:      #e8b84b;
      --gold2:     #c49030;
      --gold3:     #f5d07a;
      --goldfade:  rgba(232,184,75,0.07);
      --goldring:  rgba(232,184,75,0.18);
      --red:       #e84b6a;
      --redfade:   rgba(232,75,106,0.09);
      --green:     #2ecc8a;
      --greenfade: rgba(46,204,138,0.09);
      --blue:      #4a8fff;
      --bluefade:  rgba(74,143,255,0.09);
      --purple:    #9b6dff;
      --purpfade:  rgba(155,109,255,0.09);
      --amber:     #ffb347;
      --amberfade: rgba(255,179,71,0.09);
      --teal:      #2eccd5;
      --tealfade:  rgba(46,204,213,0.09);
      --text:      #eae6f5;
      --text2:     #a9a1c2;
      --text3:     #6a6380;
      --muted:     #43405c;
      --font-d:    'Barlow Condensed', sans-serif;
      --font-b:    'Sora', sans-serif;
      --font-m:    'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body { background:var(--bg); color:var(--text); font-family:var(--font-b); font-size:14px; line-height:1.5; overflow:hidden; }

    /* ══ SHELL ══ */
    .shell { display:grid; grid-template-columns:260px 1fr; grid-template-rows:52px 1fr; height:100vh; }

    /* ══ TOPNAV ══ */
    .topnav { grid-column:1/-1; display:flex; align-items:center; justify-content:space-between; padding:0 24px; background:var(--surface); border-bottom:1px solid var(--border); z-index:20; }
    .brand { display:flex; align-items:center; gap:10px; }
    .brand-mark { background:var(--gold); color:var(--bg); font-family:var(--font-d); font-weight:800; font-size:14px; width:26px; height:26px; border-radius:5px; display:flex; align-items:center; justify-content:center; }
    .brand-name { font-family:var(--font-d); font-size:16px; font-weight:700; }
    .topnav-center { display:flex; align-items:center; gap:8px; }
    .deal-badge { font-family:var(--font-m); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; padding:4px 12px; border-radius:20px; background:var(--goldfade); border:1px solid var(--goldring); color:var(--gold); display:flex; align-items:center; gap:6px; }
    .deal-pulse { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse-green 2s ease-in-out infinite; }
    @keyframes pulse-green { 0%,100%{box-shadow:0 0 0 0 rgba(46,204,138,0.4)} 50%{box-shadow:0 0 0 5px rgba(46,204,138,0)} }
    .tn-btn { padding:6px 14px; border:1px solid var(--border2); background:transparent; color:var(--text2); font-family:var(--font-m); font-size:10px; letter-spacing:0.5px; text-transform:uppercase; border-radius:6px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
    .tn-btn:hover { border-color:var(--gold2); color:var(--gold); }
    .tn-btn.gold { background:var(--gold); border-color:var(--gold); color:var(--bg); }
    .tn-btn.gold:hover { background:var(--gold3); }
    .tn-btn.red { background:transparent; border-color:rgba(232,75,106,0.4); color:var(--red); }
    .tn-btn.red:hover { background:var(--redfade); border-color:var(--red); }
    .tn-btn:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }

    /* ══ DEAL LIST SIDEBAR ══ */
    .deal-sidebar { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .ds-header { padding:14px 16px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .ds-title { font-family:var(--font-d); font-size:17px; font-weight:800; display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .ds-pipe-val { font-family:var(--font-d); font-size:13px; font-weight:700; color:var(--green); }
    .ds-search { width:100%; background:var(--bg); border:1px solid var(--border2); border-radius:7px; padding:7px 11px; color:var(--text); font-family:var(--font-m); font-size:11px; outline:none; transition:border-color 0.15s; }
    .ds-search:focus { border-color:var(--gold2); }
    .ds-search::placeholder { color:var(--muted); }
    .stage-filters { display:flex; gap:4px; margin-top:8px; overflow-x:auto; scrollbar-width:none; }
    .stage-filters::-webkit-scrollbar { display:none; }
    .sf-pill { padding:3px 9px; border:1px solid var(--border2); border-radius:12px; font-family:var(--font-m); font-size:8px; letter-spacing:0.5px; text-transform:uppercase; color:var(--text3); cursor:pointer; transition:all 0.12s; white-space:nowrap; flex-shrink:0; }
    .sf-pill:hover { border-color:var(--gold2); color:var(--text2); }
    .sf-pill.active { background:var(--goldfade); border-color:var(--goldring); color:var(--gold); }
    .ds-list { flex:1; overflow-y:auto; padding:8px 0; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }

    /* Deal list item */
    .deal-item { padding:11px 14px; cursor:pointer; border-left:3px solid transparent; transition:all 0.15s; position:relative; }
    .deal-item:hover { background:var(--goldfade); }
    .deal-item.active { background:rgba(232,184,75,0.05); border-left-color:var(--gold); }
    .di-top { display:flex; align-items:center; gap:9px; margin-bottom:6px; }
    .di-logo { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-size:12px; font-weight:800; flex-shrink:0; border:1px solid var(--border2); }
    .di-name { font-family:var(--font-d); font-size:14px; font-weight:700; color:var(--text); flex:1; }
    .di-value { font-family:var(--font-d); font-size:13px; font-weight:700; color:var(--green); }
    .di-stage { font-family:var(--font-m); font-size:8px; letter-spacing:0.5px; padding:2px 7px; border-radius:3px; border:1px solid; text-transform:uppercase; }
    .di-conf-row { display:flex; align-items:center; gap:7px; }
    .di-conf-bar { flex:1; height:3px; background:var(--border2); border-radius:2px; overflow:hidden; }
    .di-conf-fill { height:100%; border-radius:2px; transition:width 1s; }
    .di-conf-pct { font-family:var(--font-m); font-size:9px; color:var(--text3); }
    .di-next { font-family:var(--font-m); font-size:9px; color:var(--text3); margin-top:4px; }
    .di-urgent { position:absolute; top:11px; right:12px; width:7px; height:7px; border-radius:50%; animation:pulse-green 2s infinite; }

    /* ══ MAIN DEAL AREA ══ */
    .deal-main { display:grid; grid-template-columns:280px 1fr 280px; overflow:hidden; }

    /* ── Deal Card ── */
    .deal-card-col { background:var(--surface2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }
    .dc-header { padding:14px 16px 12px; border-bottom:1px solid var(--border); background:var(--surface3); flex-shrink:0; }
    .dc-company-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .dc-logo { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-size:16px; font-weight:800; border:1px solid var(--border2); flex-shrink:0; }
    .dc-company { font-family:var(--font-d); font-size:20px; font-weight:800; color:var(--text); }
    .dc-industry { font-family:var(--font-m); font-size:9px; color:var(--text3); }
    .dc-value { font-family:var(--font-d); font-size:36px; font-weight:800; color:var(--gold); line-height:1; }
    .dc-value-sub { font-family:var(--font-m); font-size:9px; color:var(--text3); margin-bottom:10px; }

    .conf-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; font-family:var(--font-m); font-size:10px; color:var(--text3); }
    .conf-bar { height:6px; background:var(--border2); border-radius:3px; overflow:hidden; margin-bottom:10px; }
    .conf-fill { height:100%; border-radius:3px; transition:width 1s; }

    .dc-stage-track { display:flex; align-items:center; gap:0; margin-bottom:12px; }
    .stage-node { display:flex; flex-direction:column; align-items:center; position:relative; }
    .sn-dot { width:10px; height:10px; border-radius:50%; border:2px solid var(--border2); background:var(--surface3); flex-shrink:0; transition:all 0.3s; }
    .sn-dot.done { background:var(--green); border-color:var(--green); }
    .sn-dot.current { background:var(--gold); border-color:var(--gold); box-shadow:0 0 0 3px rgba(232,184,75,0.2); }
    .sn-label { font-family:var(--font-m); font-size:7px; color:var(--text3); margin-top:3px; white-space:nowrap; }
    .sn-label.active { color:var(--gold); }
    .stage-line { flex:1; height:2px; background:var(--border2); margin-bottom:12px; }
    .stage-line.done { background:var(--green); }

    .dc-body { padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
    .dc-field { }
    .dcf-label { font-family:var(--font-m); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text3); margin-bottom:3px; }
    .dcf-val { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px; }
    .dcf-av { width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-size:10px; font-weight:800; flex-shrink:0; }

    .bant-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:3px; }
    .bant-cell { display:flex; align-items:center; gap:5px; padding:5px 8px; border-radius:5px; border:1px solid; }
    .bant-cell.yes { background:var(--greenfade); border-color:rgba(46,204,138,0.2); }
    .bant-cell.no  { background:var(--surface4); border-color:var(--border2); }
    .bant-key { font-family:var(--font-m); font-size:9px; font-weight:500; }
    .bant-cell.yes .bant-key { color:var(--green); }
    .bant-cell.no  .bant-key { color:var(--text3); }
    .bant-check { font-size:10px; }

    .dc-actions { padding:14px 16px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; flex-shrink:0; }
    .dc-btn { width:100%; padding:9px; border:1px solid var(--border2); background:transparent; color:var(--text2); font-family:var(--font-m); font-size:9px; letter-spacing:0.5px; text-transform:uppercase; border-radius:7px; cursor:pointer; transition:all 0.15s; }
    .dc-btn:hover { border-color:var(--gold2); color:var(--gold); }
    .dc-btn.primary { background:var(--gold); border-color:var(--gold); color:var(--bg); }
    .dc-btn.primary:hover { background:var(--gold3); }
    .dc-btn.danger { border-color:rgba(232,75,106,0.3); color:var(--red); }
    .dc-btn.danger:hover { border-color:var(--red); background:var(--redfade); }
    .dc-btn:focus-visible { outline:2px solid var(--gold); outline-offset:2px; }

    /* ── Center: Conversation + Intel + Steps ── */
    .deal-center { display:flex; flex-direction:column; overflow:hidden; }

    /* Conversation */
    .conv-area { display:flex; flex-direction:column; flex:1; overflow:hidden; border-bottom:1px solid var(--border); min-height:0; }
    .conv-header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px 8px; background:var(--surface3); border-bottom:1px solid var(--border); flex-shrink:0; }
    .conv-title { font-family:var(--font-d); font-size:14px; font-weight:700; display:flex; align-items:center; gap:7px; }
    .conv-thread-pills { display:flex; gap:5px; }
    .ctp { padding:3px 9px; border:1px solid var(--border2); border-radius:12px; font-family:var(--font-m); font-size:9px; color:var(--text3); cursor:pointer; transition:all 0.12s; }
    .ctp:hover { border-color:var(--gold2); color:var(--text2); }
    .ctp.active { border-color:var(--goldring); color:var(--gold); background:var(--goldfade); }

    .conv-messages { flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:12px; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }

    /* Message bubbles */
    .msg { display:flex; gap:9px; animation:msgIn 0.25s ease both; }
    @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .msg.mine { flex-direction:row-reverse; }
    .msg-av { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-size:11px; font-weight:800; flex-shrink:0; }
    .msg-body { max-width:70%; }
    .msg-sender { font-family:var(--font-m); font-size:9px; color:var(--text3); margin-bottom:3px; }
    .msg.mine .msg-sender { text-align:right; color:var(--gold2); }
    .msg-bubble { padding:10px 13px; border-radius:10px; font-size:12px; line-height:1.55; color:var(--text2); }
    .msg.theirs .msg-bubble { background:var(--surface3); border:1px solid var(--border2); border-radius:10px 10px 10px 2px; }
    .msg.mine .msg-bubble { background:rgba(232,184,75,0.12); border:1px solid var(--goldring); color:var(--text); border-radius:10px 10px 2px 10px; }
    .msg-file { display:flex; align-items:center; gap:7px; margin-top:7px; padding:7px 10px; background:var(--surface2); border:1px solid var(--border2); border-radius:6px; cursor:pointer; transition:all 0.12s; }
    .msg-file:hover { border-color:var(--gold2); }
    .msg-file-name { font-family:var(--font-m); font-size:10px; color:var(--blue); }
    .msg-time { font-family:var(--font-m); font-size:8px; color:var(--muted); margin-top:3px; }
    .msg.mine .msg-time { text-align:right; }

    .msg-ai { background:linear-gradient(135deg,rgba(155,109,255,0.06),rgba(232,184,75,0.06)); border:1px solid rgba(155,109,255,0.2); border-radius:10px; padding:10px 13px; margin-left:37px; }
    .ai-label { font-family:var(--font-m); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--purple); margin-bottom:4px; display:flex; align-items:center; gap:5px; }
    .ai-msg-text { font-size:12px; color:var(--text2); line-height:1.55; }
    .ai-action-row { display:flex; gap:6px; margin-top:8px; }
    .ai-action { padding:5px 11px; border:1px solid var(--goldring); background:var(--goldfade); color:var(--gold2); font-family:var(--font-m); font-size:9px; border-radius:5px; cursor:pointer; transition:all 0.12s; }
    .ai-action:hover { background:var(--gold); color:var(--bg); border-color:var(--gold); }

    .conv-compose { padding:10px 14px; background:var(--surface2); border-top:1px solid var(--border); flex-shrink:0; }
    .compose-row { display:flex; gap:8px; align-items:flex-end; }
    .compose-input { flex:1; background:var(--bg); border:1px solid var(--border2); border-radius:8px; padding:9px 13px; color:var(--text); font-family:var(--font-b); font-size:12px; outline:none; transition:border-color 0.15s; resize:none; min-height:38px; max-height:100px; line-height:1.5; }
    .compose-input:focus { border-color:var(--gold2); box-shadow:0 0 0 3px rgba(232,184,75,0.07); }
    .compose-input::placeholder { color:var(--muted); }
    .compose-btns { display:flex; gap:5px; flex-shrink:0; }
    .compose-btn { width:34px; height:34px; border-radius:7px; border:1px solid var(--border2); background:transparent; color:var(--text3); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:all 0.12s; }
    .compose-btn:hover { border-color:var(--gold2); color:var(--gold); }
    .compose-send { width:34px; height:34px; border-radius:7px; background:var(--gold); border:none; color:var(--bg); cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
    .compose-send:hover { background:var(--gold3); }

    /* Bottom split: Intel + Next Steps */
    .bottom-split { display:grid; grid-template-columns:1fr 1fr; border-top:1px solid var(--border); flex-shrink:0; }

    /* Competitive Intel */
    .intel-col { border-right:1px solid var(--border); display:flex; flex-direction:column; max-height:230px; }
    .intel-header { padding:9px 14px 7px; background:var(--surface3); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .intel-title { font-family:var(--font-d); font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
    .intel-body { flex:1; overflow-y:auto; padding:10px 14px; display:flex; flex-direction:column; gap:7px; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }
    .intel-item { display:flex; align-items:flex-start; gap:8px; }
    .ii-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:5px; }
    .ii-text { font-size:11px; color:var(--text2); line-height:1.5; }
    .ii-tag { display:inline-block; font-family:var(--font-m); font-size:8px; padding:1px 6px; border-radius:3px; border:1px solid; margin-left:5px; }

    /* Next Steps */
    .steps-col { display:flex; flex-direction:column; max-height:230px; }
    .steps-header { padding:9px 14px 7px; background:var(--surface3); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .steps-title { font-family:var(--font-d); font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
    .steps-body { flex:1; overflow-y:auto; padding:10px 14px; display:flex; flex-direction:column; gap:6px; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }
    .step-item { display:flex; align-items:flex-start; gap:9px; }
    .step-cb { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border2); background:transparent; flex-shrink:0; margin-top:2px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; font-size:10px; }
    .step-cb.checked { background:var(--green); border-color:var(--green); }
    .step-cb:hover { border-color:var(--gold2); }
    .step-text { flex:1; }
    .st-title { font-size:11px; color:var(--text2); line-height:1.4; }
    .st-title.done { text-decoration:line-through; color:var(--text3); }
    .st-meta { font-family:var(--font-m); font-size:9px; color:var(--text3); }
    .st-urgent { font-family:var(--font-m); font-size:8px; padding:1px 6px; border-radius:3px; background:var(--redfade); border:1px solid rgba(232,75,106,0.25); color:var(--red); }

    /* ── Right: Activity Timeline ── */
    .activity-col { background:var(--surface2); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
    .ac-header { padding:14px 16px 10px; background:var(--surface3); border-bottom:1px solid var(--border); flex-shrink:0; }
    .ac-title { font-family:var(--font-d); font-size:14px; font-weight:700; display:flex; align-items:center; gap:7px; }
    .ac-body { flex:1; overflow-y:auto; padding:14px 16px; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; }
    .activity-item { display:flex; gap:10px; margin-bottom:14px; }
    .ai-line { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
    .ai-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:3px; }
    .ai-connector { flex:1; width:1px; background:var(--border2); margin:3px 0; min-height:20px; }
    .ai-content { flex:1; padding-bottom:2px; }
    .aic-title { font-size:11px; font-weight:500; color:var(--text); line-height:1.4; }
    .aic-meta { font-family:var(--font-m); font-size:9px; color:var(--text3); margin-top:2px; }

    .ac-ai-nudge { margin:0 16px 12px; background:linear-gradient(135deg,rgba(155,109,255,0.07),rgba(232,184,75,0.05)); border:1px solid rgba(155,109,255,0.2); border-radius:8px; padding:10px 12px; }
    .nudge-label { font-family:var(--font-m); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--purple); margin-bottom:4px; }
    .nudge-text { font-size:11px; color:var(--text2); line-height:1.5; }
    .nudge-btn { margin-top:7px; padding:5px 12px; background:var(--gold); border:none; color:var(--bg); font-family:var(--font-m); font-size:9px; letter-spacing:0.5px; text-transform:uppercase; border-radius:5px; cursor:pointer; transition:all 0.12s; }
    .nudge-btn:hover { background:var(--gold3); }

    /* ══ MODAL ══ */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(4px); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }

const stageBgs    = { Qualify:'transparent', Discover:'var(--bluefade)', Propose:'var(--purpfade)', Negotiate:'var(--goldfade)', Close:'var(--greenfade)' };

function renderDealList() {
  const container = document.getElementById('dealList');
  const filtered  = DEALS.filter(d => {
    const matchText = d.company.toLowerCase().includes(dealFilter) || d.industry.toLowerCase().includes(dealFilter);
    const matchStage = stageFilter === 'All' || d.stage === stageFilter;
    return matchText && matchStage;
  });

  const totalPipe = filtered.reduce((sum,d) => sum + d.value, 0);
  document.getElementById('totalPipe').textContent = fmtMoney(totalPipe);

  container.innerHTML = filtered.map(d => {
    const confColor = d.confidence >= 60 ? 'var(--green)' : d.confidence >= 35 ? 'var(--gold)' : 'var(--red)';
    return `
      <div class="deal-item ${d.id === activeDealId ? 'active' : ''}"
           onclick="loadDeal(${d.id})"
           role="listitem"
           aria-label="${d.company}: ${fmtMoney(d.value)}, ${d.stage}, ${d.confidence}% confidence"
           aria-selected="${d.id === activeDealId}">
        ${d.urgent ? `<div class="di-urgent" style="background:var(--green)" aria-label="Needs attention"></div>` : ''}
        <div class="di-top">
          <div class="di-logo" style="background:${d.logo.bg};color:${d.logo.c}" aria-hidden="true">${d.logo.i}</div>
          <div>
            <div class="di-name">${esc(d.company)}</div>
            <div style="font-family:var(--font-m);font-size:9px;color:var(--text3)">${esc(d.industry)}</div>
          </div>
          <div class="di-value">${fmtMoney(d.value)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
          <span class="di-stage" style="color:${stageColors[d.stage]};border-color:${stageBorders[d.stage]};background:${stageBgs[d.stage]}">${d.stage}</span>
          <span style="font-family:var(--font-m);font-size:9px;color:var(--text3)">Close ${d.closeDate}</span>
        </div>
        <div class="di-conf-row" aria-label="Confidence: ${d.confidence}%">
          <div class="di-conf-bar"><div class="di-conf-fill" data-pct="${d.confidence}" style="background:${confColor};width:0"></div></div>
          <div class="di-conf-pct" style="color:${confColor}">${d.confidence}%</div>
        </div>
        <div class="di-next">${d.champion.name} · ${d.steps.filter(s=>!s.done).length} next steps</div>
      </div>`;
  }).join('');

  requestAnimationFrame(() => {
    container.querySelectorAll('.di-conf-fill[data-pct]').forEach(el => { el.style.width = el.dataset.pct + '%'; });

function renderConversation(d) {
  const container = document.getElementById('convMessages');

function buildMessage(m) {
  if (m.type === 'ai') {
    return `
      <div class="msg-ai" role="article" aria-label="AI Co-Pilot suggestion">
        <div class="ai-label"><span aria-hidden="true">✦</span> AI Co-Pilot · ${m.time}</div>
        <div class="ai-msg-text">${esc(m.text)}</div>
        <div class="ai-action-row">
          <button class="ai-action" onclick="insertAIDraft()" aria-label="Use this draft">Use Draft</button>
          <button class="ai-action" onclick="showToast('Dismissed','AI suggestion dismissed','info')" aria-label="Dismiss suggestion">Dismiss</button>
        </div>
      </div>`;
  }
  const mine = m.type === 'mine';
  const fileHTML = m.file ? `
    <div class="msg-file" onclick="showToast('File','Opening ${esc(m.file)}…','info')" role="button" aria-label="Open file ${esc(m.file)}">
      <span aria-hidden="true">📎</span>
      <span class="msg-file-name">${esc(m.file)}</span>
    </div>` : '';

  return `
    <div class="msg ${mine?'mine':'theirs'}" role="article" aria-label="${m.type==='mine'?'Your message':'Message from '+m.from}">
      <div class="msg-av" style="background:${m.av.bg};color:${m.av.c}" aria-hidden="true">${m.av.i}</div>
      <div class="msg-body">
        <div class="msg-sender">${esc(mine ? 'You (Alex)' : m.from)}</div>
        <div class="msg-bubble">${esc(m.text)}${fileHTML}</div>
        <div class="msg-time">${esc(m.time)}</div>
      </div>
    </div>`;
}

function setThread(btn, thread) {
  document.querySelectorAll('.ctp').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed','false'); });

}

function sendMessage() {
  const input = document.getElementById('composeInput');
  const text = input.value.trim();
  if (!text) return;
  const d = DEALS.find(x => x.id === activeDealId);
  if (!d) return;
  const newMsg = { from:'You', av:{ bg:'#e8b84b', c:'#000', i:'AX' }, text, time:'Just now', type:'mine', thread:'email' };
  d.messages.push(newMsg);
  const container = document.getElementById('convMessages');
  const div = document.createElement('div');
  div.innerHTML = buildMessage(newMsg);
  container.appendChild(div.firstChild);
  container.scrollTop = container.scrollHeight;
  input.value = '';
  input.style.height = 'auto';
  showToast('Sent', 'Message sent to '+d.champion.name, 'success');
}

/* ═══════════════════
   NEXT STEPS
═══════════════════ */
function renderSteps(d) {
  const body = document.getElementById('stepsBody');
  if (!nextStates[d.id]) nextStates[d.id] = {};
  body.innerHTML = d.steps.map(s => {
    const checked = s.done || !!nextStates[d.id][s.id];
    return `
      <div class="step-item" role="listitem">
        <div class="step-cb ${checked?'checked':''}"
             onclick="toggleStep(${d.id},'${s.id}')"
             role="checkbox"
             aria-checked="${checked}"
             aria-label="Toggle: ${esc(s.text)}"
             tabindex="0"
             onkeydown="if(event.key===' ')toggleStep(${d.id},'${s.id}')">
          ${checked ? '✓' : ''}
        </div>
        <div class="step-text">
          <div class="st-title ${checked?'done':''}">${esc(s.text)}</div>
          <div class="st-meta">${esc(s.owner)} · ${esc(s.date)} ${s.urgent&&!checked?`<span class="st-urgent">URGENT</span>`:''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleStep(dealId, stepId) {
  if (!nextStates[dealId]) nextStates[dealId] = {};
  const d    = DEALS.find(x => x.id === dealId);
  const step = d?.steps.find(s => s.id === stepId);
  if (!step) return;
  if (step.done) { step.done = false; } else { nextStates[dealId][stepId] = !nextStates[dealId][stepId]; }
  const checked = step.done || !!nextStates[dealId][stepId];
  if (checked) showToast('Step Complete', `"${step.text}" marked done`, 'success');
  renderSteps(d);
}

          <div style="font-family:var(--font-m);font-size:9px;color:var(--purple);margin-bottom:3px">Multi-thread to Patrick Collison →</div>
          <div style="font-size:11px;color:var(--text2)">"Patrick, wanted to make sure you had visibility into the timeline Sarah and I have been discussing…"</div>
        </div>
      </div>`,
    confirm: 'Close',
    onConfirm: () => {},
  },
};

let currentModalData = null;
function openModal(key, data) {
  const def = MODALS[key];
  if (!def) return;
  currentModalData = data;
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">${def.title}</div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">${def.body(data)}</div>
    <div class="modal-footer">
      <button class="mf-cancel" onclick="closeModal()">Cancel</button>
      <button class="mf-confirm" onclick="confirmModal('${key}')">${esc(def.confirm||'Confirm')}</button>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => modal.querySelector('input,select,button,textarea')?.focus(), 260);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function confirmModal(key) {
  const def = MODALS[key];
  if (def?.onConfirm?.(currentModalData) !== false) closeModal();
}

document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

/* ═══════════════════
   TOAST
═══════════════════ */
const TOAST_ICONS = { success:'✅', info:'ℹ️', warn:'⚠️', error:'❌' };
function showToast(title, message, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div'); t.className = `toast ${type}`;
  const ico = document.createElement('div'); ico.className='t-ico'; ico.setAttribute('aria-hidden','true'); ico.textContent=TOAST_ICONS[type]||'●';
  const b=document.createElement('div');
  const tt=document.createElement('div'); tt.className='t-ttl'; tt.textContent=title;
  const tm=document.createElement('div'); tm.className='t-msg'; tm.textContent=message;
  b.append(tt,tm); t.append(ico,b); c.appendChild(t);
  setTimeout(() => { t.classList.add('leaving'); t.addEventListener('animationend',()=>t.remove(),{once:true}); }, 3500);
}

/* ═══════════════════
   UTILS
═══════════════════ */
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtMoney(n) { if(n>=1000000)return'$'+(n/1000000).toFixed(1)+'M'; if(n>=1000)return'$'+(n/1000).toFixed(0)+'k'; return'$'+n; }

/* ═══════════════════
   BOOT
═══════════════════ */
renderDealList();
loadDeal(1);
</script>
